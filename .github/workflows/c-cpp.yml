name: C/C++ CI

on:
  push:
    branches: [ master, feature/* ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        configure_args:
          - >-
            --enable-html-matrix=yes
            --enable-parallel=yes
            --enable-pytest=yes
            --enable-shared=yes
            --enable-static=yes
            --enable-usrp=no
            --enable-winradio=yes
            --with-cxx-binding=yes
            --with-indi=yes
            --with-libusb=yes
            --with-lua-binding=yes
            --with-perl-binding=yes
            --with-python-binding=yes
            --with-readline=yes
            --with-tcl-binding=yes
            --with-xml-support=yes

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies on Linux
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install libusb-1.0-0-dev
        sudo apt install libgd-dev
        sudo apt install libgpiod-dev
        sudo apt install libindi-dev libnova-dev
        sudo apt install grep
        sudo apt install python3-dev python3-pytest
        sudo apt install lua5.4 liblua5.4-dev libperl-dev tcl-dev
    - name: Install dependencies on macOS
      if: runner.os == 'macOS'
      run: |
        brew install autoconf
        brew install automake
        brew install libtool
        brew install grep
        brew install python3
        brew install swig
        echo "brew --prefix python $(brew --prefix python)"
    - name: bootstrap
      run: ./bootstrap
    - name: Suppress -Winitializer-overrides on macOS
      if: runner.os == 'macOS'
      run: |
        export CFLAGS="$CFLAGS -Wno-initializer-overrides"
        export CXXFLAGS="$CXXFLAGS -Wno-initializer-overrides"
    - name: configure on macOS
      if: runner.os == 'macOS'
      run: ./configure ${{ matrix.configure_args }} --enable-silent-rules --without-lua-binding --with-python_prefix=$(brew --prefix python)
    - name: make distcheck
      run: make distcheck V=0 --no-print-directory
